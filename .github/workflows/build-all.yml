name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: "Build version"
        required: true
        default: "0.1.0"
      build_number:
        description: "Build number"
        required: true
        default: "1"

env:
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  UV_PYTHON: "3.13"
  BUILD_VERSION: ${{ inputs.build_version || github.ref_name || '0.1.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || '1' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Lint with Ruff
        run: uv run ruff check src/

  # ─── Android APK (universal) ───────────────────────────
  build-apk:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > upload-key.jks
      - name: Build APK (universal)
        env:
          FLET_ANDROID_SIGNING_KEY_STORE: ${{ github.workspace }}/upload-key.jks
          FLET_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          FLET_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: uv run flet build apk --yes --project nkiri-tv --product "Nkiri TV" --org com.nkiritv --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: apk-universal
          path: build/apk/

  # ─── Android APK (split per ABI) ───────────────────────
  build-apk-split:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > upload-key.jks
      - name: Build APK (split per ABI)
        env:
          FLET_ANDROID_SIGNING_KEY_STORE: ${{ github.workspace }}/upload-key.jks
          FLET_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          FLET_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: uv run flet build apk --yes --project nkiri-tv --product "Nkiri TV" --org com.nkiritv --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} --split-per-abi -v
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: apk-split-abi
          path: build/apk/

  # ─── Release ───────────────────────────────────────────
  release:
    needs: [build-apk, build-apk-split]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v5.0.0
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/apk-universal/*.apk
            artifacts/apk-split-abi/*.apk
          tag_name: ${{ env.BUILD_VERSION }}
          generate_release_notes: true
